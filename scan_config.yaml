# ── Serial Settings ──
serial:
  port: "/dev/ttyACM1"
  baudrate: 115200
  timeout: 10.0          # seconds to wait for 'ok' per command

# ── Camera Settings ──
camera:
  resolution: "800p"     # 400p | 480p | 720p | 800p
  confidence: 200        # stereo confidence threshold (0-255)
  median_filter: 7       # median kernel: 0 (off) | 3 | 5 | 7
  subpixel: true
  lr_check: true
  extended_disparity: false

# ── Motion Settings ──
motion:
  feedrate: 1250         # mm/min for all G1 moves
  z_height: 50.0         # fixed Z for the scan (mm)
  settle_time: 0.25       # seconds to wait after each move before capture

# ── Grid Definition ──
#   Each axis: start, stop, step (inclusive of endpoints)
grid:
  x_start: 100.0
  x_stop: 500.0
  x_step: 100.0
  y_start: 100.0
  y_stop: 400.0
  y_step: 100.0

# ── Output Settings ──
output:
  directory: "scan_output"
  save_raw_npy: true       # uint16 depth in mm
  save_depth_png: true     # colormapped depth image
  save_rgb_png: true       # colour reference frame
