# ── Serial Settings ──
serial:
  port: "/dev/ttyACM0"
  baudrate: 115200
  timeout: 20.0          # seconds to wait for 'ok' per command

# ── Camera Settings ──
camera:
  fps: 30
  confidence: 75        # stereo confidence threshold (0-255)
  median_filter: 0       # median kernel: 0 (off) | 3 | 5 | 7
  subpixel: false
  subpixel_frac_bits: 3
  lr_check: true
  lr_check_th: 9
  extended_disparity: false
  disparity_shift: 30
  warmup_frames: 5

# ── Motion Settings ──
motion:
  feedrate: 5000         # mm/min for all G1 moves
  z_height: 50.0         # fixed Z for the scan (mm)
  settle_time: 0.1       # seconds to wait after each move before capture

# ── Grid Definition ──
#   Each axis: start, stop, step (inclusive of endpoints)
grid:
  x_start: 50.0
  x_stop: 550.0
  x_step: 50.0
  y_start: 75.0
  y_stop: 425.0
  y_step: 50.0

# ── Output Settings ──
output:
  directory: "scan_output"
  save_raw_npy: true       # uint16 depth in mm
  save_depth_png: true     # colormapped depth image
  save_rgb_png: true       # colour reference frame
